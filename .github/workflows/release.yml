name: Release
on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Check version consistency
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./package.json').version")
          SKILL=$(node -p "require('./packages/skill/package.json').version")
          [ "$PKG" = "$TAG" ] || (echo "package.json version $PKG != tag $TAG" && exit 1)
          [ "$SKILL" = "$TAG" ] || (echo "packages/skill/package.json version $SKILL != tag $TAG" && exit 1)
          echo "Version $TAG consistent across all package files"
      - name: Publish plugin
        run: npm publish --provenance --access public
      - name: Publish skill package
        working-directory: packages/skill
        run: npm publish --provenance --access public
